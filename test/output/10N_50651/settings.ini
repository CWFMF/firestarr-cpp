################################################################################
#####                          SIMULATION INPUTS                           #####
################################################################################
# output directory (warning if not the same as path for this file)
OUTPUT_DIRECTORY = /appl/firestarr/test/output/10N_50651
# simulation mode (one of [SIMULATION, TEST, SURFACE])
MODE = SIMULATION
# weather file path
WX = ../../input/10N_50651/firestarr_10N_50651_wx.csv
# log file name (created in output directoy)
LOG_FILE_NAME = firestarr.log
# perimeter to use for ignition
PERIMETER = ../../input/10N_50651/10N_50651.tif
# root directory to read rasters from
RASTER_ROOT = ../../input/10N_50651
# lookup table for fuels (prometheus format)
FUEL_LOOKUP_TABLE = ../../../fuel.lut
# default Percent Conifer (PC) for M1/M2 fuels where none is specified (%)
DEFAULT_PERCENT_CONIFER = 50
# default Percent Dead Fir (PDF) for M3/M4 fuels where none is specified (%)
DEFAULT_PERCENT_DEAD_FIR = 30
# force greenup for entire simulation (0 = off, 1 = on)
FORCE_GREENUP = 0
# force no greenup for entire simulation (0 = off, 1 = on)
FORCE_NO_GREENUP = 0
# static curing value to force for entire simulation (no value = off)
CURING = 
# offset from UTC to use for determining sunrise/sunset (hours)
TZ = -5
# salt to use for random seeds
SALT = 0
# initial fire size (ha) (if no perimeter)
SIZE = 
# ignition start date (yyyy-mm-dd)
START_DATE = 2024-06-03
# ignition start time (HH:MM)
START_TIME = 01:00
# latitude of area center & ignition if no perimeter (decimal degrees)
LATITUDE = 58.81228184403946
# longitude of area center & ignition if no perimeter (decimal degrees)
LONGITUDE = -122.9117103995713
# fine fuel moisture code
FFMC = 89.90000000000001
# duff moisture code
DMC = 59.5
# drought code
DC = 450.9
################################################################################
#####                          SIMULATION OPTIONS                          #####
################################################################################
# minimum rate of spread before fire is considered to actually be spreading
MINIMUM_ROS = 0.05
# maximum distance that the fire is allowed to spread in one step (# of cells)
MAX_SPREAD_DISTANCE = 0.4
# minimum ffmc for fire to spread
MINIMUM_FFMC = 65
# minimum ffmc for fire to spread at night
MINIMUM_FFMC_AT_NIGHT = 85
# offset from sunrise at which the day is considered to start (hours)
OFFSET_SUNRISE = 0
# offset from sunrise at which the day is considered to end (hours)
OFFSET_SUNSET = 0
# weight given to scenario when generating random thresholds
THRESHOLD_SCENARIO_WEIGHT = 1
# weight given to daily when generating random thresholds
THRESHOLD_DAILY_WEIGHT = 3
# weight given to hourly when generating random thresholds
THRESHOLD_HOURLY_WEIGHT = 2
################################################################################
#####                            OUTPUT OPTIONS                            #####
################################################################################
# days to output probability contours for
OUTPUT_DATE_OFFSETS = [1]
# save grids as .asc (0 = off, 1 = on)
SAVE_AS_ASCII = 0
# to save grids as .tif (0 = off, 1 = on)
SAVE_AS_TIFF = 1
# save points used for spread (0 = off, 1 = on)
SAVE_POINTS = 0
# save intensity grids (0 = off, 1 = on)
SAVE_INTENSITY = 1
# save probability grids (0 = off, 1 = on)
SAVE_PROBABILITY = 1
# save occurrence grids (0 = off, 1 = on)
SAVE_OCCURRENCE = 0
# save simulation area grids (0 = off, 1 = on)
SAVE_SIMULATION_AREA = 0
# maximum fire intensity for the 'low' range of intensity (kW/m)
INTENSITY_MAX_LOW = 2000
# maximum fire intensity for the 'moderate' range of intensity (kW/m)
INTENSITY_MAX_MODERATE = 4000
# save individual grids (0 = off, 1 = on)
SAVE_INDIVIDUAL = 0
################################################################################
#####                          EXECUTION OPTIONS                           #####
################################################################################
# run things asynchronously where possible (0 = off, 1 = on)
RUN_ASYNC = 1
# run deterministically (100% chance of spread & survival)  (0 = off, 1 = on)
DETERMINISTIC = 0
# confidence required before simulation stops (1.0 - (% / 100))
CONFIDENCE_LEVEL = 0.1
# time between generating interim outputs (seconds) (0 is no interim outputs)
INTERIM_OUTPUT_INTERVAL = 0
# maximum amount of time to take for simulation (seconds) (0 is unlimited)
MAXIMUM_TIME = 0
# minimum number of simulations (0 == 1 simulation per scenario)
MINIMUM_SIMULATIONS = 10
# minimum number of simulations where any spread occurs
MINIMUM_ACTIVE_SIMULATIONS = 3
# maximum number of simulations to do
MAXIMUM_SIMULATIONS = 10000
